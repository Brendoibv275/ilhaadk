services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 6s
      retries: 10

  dashboard-web:
    build:
      context: ./dashboard-web
      dockerfile: Dockerfile
    environment:
      BACKEND_INTERNAL_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    # Host 3010 evita conflito com Easypanel (costuma usar :3000)
    ports:
      - "3010:3000"
