services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sdr
      POSTGRES_PASSWORD: sdr
      POSTGRES_DB: sdr
    ports:
      - "5433:5432"
    volumes:
      - sdr_pgdata:/var/lib/postgresql/data
      # Primeira subida: Postgres aplica o schema. Volume já existente: ver README / comando psql manual.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/10-ilha-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdr -d sdr"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Dentro do Compose o host da BD é o serviço `postgres`, não 127.0.0.1
      DATABASE_URL: postgresql://sdr:sdr@postgres:5432/sdr
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 6s
      retries: 10

  dashboard-web:
    build:
      context: ./dashboard-web
      dockerfile: Dockerfile
    environment:
      BACKEND_INTERNAL_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    # Host 3010 evita conflito com Easypanel (costuma usar :3000)
    ports:
      - "3010:3000"

volumes:
  sdr_pgdata:
